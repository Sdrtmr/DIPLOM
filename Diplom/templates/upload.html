{% extends "base.html" %}

{% block content %}
<div class="card" style="max-width: 600px; margin: 2rem auto;">
    <h1>Загрузка файла</h1>

    <form method="post" enctype="multipart/form-data" style="box-shadow: none; padding: 0;">
        <div>
            <label for="file">Выберите файл (.txt или .docx):</label>
            <input type="file" id="file" name="file" accept=".txt,.docx" required>
        </div>
        <div>
            <button type="submit" class="btn btn-success"><i class="fas fa-upload"></i> Загрузить и обработать</button>
            <a href="{{ url_for('dashboard') }}" class="btn btn-danger">Отмена</a>
        </div>
    </form>

    <p style="margin-top: 1rem; color: #7f8c8d;">
        Максимальный размер файла: <strong>50 МБ</strong>.<br>
        Поддерживаются форматы: <strong>.txt</strong> (простой текст) и <strong>.docx</strong> (Microsoft Word).<br>
        Из .docx извлекается текст всех абзацев (без сложного форматирования).
    </p>
</div>
{% endblock %}
